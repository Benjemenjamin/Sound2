<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Pose Recognition</title>
    <link rel="stylesheet" type="text/css" href="./Test.css">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <script src="Test.js" defer></script>
    <script src="GameStart.js" defer></script>
</head>

<body>

    <div class="container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
    </div>
    <div class="container">
        <input type="text" id="poseName" placeholder="pose name">:
        <button id="addPoseButton" class="button"><b>add</b> pose sample</button>
    </div>
    <audio id="RickRoll">
        <source src="RickRoll.mp3" type="audio/mpeg">
    </audio>


    <div class="punkte">
        <p id="points"></p>
    </div>

    <img id="pistoleL" style="position:absolute; left:500px; top:100px;">
    <img id="pistoleR" style="position:absolute; left:500px; top:100px;">
    <img id="SILL" style="position:absolute; left:500px; top:100px;">
    <img id="SILR" style="position:absolute; left:500px; top:100px;">
    <img id="cacs" style="position:absolute; left:500px; top:100px;">

    <div class="neu">
        <button id="StartButton" class="StartButton"><b>Start</b></button>
        <label for="file-input" class="button"><b>load</b> pose library</label>

    </div>
    <div class="container">
        <button id="saveButton" class="button"><b>save</b> pose library</button>

        <input type="file" id="file-input" name="file-input" accept=".json" />
    </div>
</body>

</html>
